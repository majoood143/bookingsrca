; Copy this file to config.ini in the same folder and fill in real values.
; config.ini is git-ignored because it holds your live API token.

; The public URL of the booking app, no trailing slash.
CLOUD_BASE_URL = https://your-app.example.com

; Copy this from Admin > Settings > Printer Settings > Agent Token.
API_TOKEN = paste-the-agent-token-here

; How often to poll for new jobs when the queue is empty.
POLL_INTERVAL_SECONDS = 10

; How this on-site machine reaches the printer: "network" or "windows".
PRINT_MODE = network

; --- network mode: the printer has its own Ethernet/WiFi port ---
PRINTER_HOST = 192.168.1.50
PRINTER_PORT = 9100
SOCKET_TIMEOUT_SECONDS = 5

; --- windows mode: printer is installed/shared on this Windows PC ---
; Use a local port name (COM1, LPT1), a printer share name (MyReceiptPrinter,
; assumed shared on this same PC), or an explicit UNC path (\\host\printer).
PRINTER_NAME =
